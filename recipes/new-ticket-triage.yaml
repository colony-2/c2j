id: new-ticket-triage
version: 0.1.0
input_schema:
  title:
    type: string
    required: true
  description:
    type: string
    required: true
inputs:
  title: '{{ inputs.title }}'
  description: '{{ inputs.description }}'
sequence:
  - id: assess_cell
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-triage-cell-boundary"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-triage-cell-boundary` skill contract.

        Ticket Title: {{ inputs.title }}
        Ticket Description:
        {{ inputs.description }}

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}

        Decide if the current cell is appropriate to run the work.
        - Treat the current cell as appropriate ONLY if it is the best match among the Available Cells.
        - Prefer specialized cells over general-purpose cells when a specialized cell clearly matches.
        - If the current cell is not the best match, set cell_is_appropriate=false and choose the
          single best cell name from the Available Cells list (use the cell \"name\" value).
        - Use the cell descriptions to guide your choice and provide a concise rationale.

        Write JSON artifact files:
        - `/src/outbox/triage/latest-status.json`
        - `/src/outbox/triage/decision.md`

        JSON schema:
        {
          "cell_is_appropriate": boolean,
          "recommended_cell": string,
          "rationale": string
        }

        Final response must be ONLY the exact JSON object above.

outputs:
  triage_json: "{{ sequence.assess_cell.outputs.assistantSummary }}"
  cell_is_appropriate: "${{ json_parse(sequence.assess_cell.outputs.assistantSummary).cell_is_appropriate }}"
  recommended_cell: "${{ json_parse(sequence.assess_cell.outputs.assistantSummary).recommended_cell }}"
  rationale: "${{ json_parse(sequence.assess_cell.outputs.assistantSummary).rationale }}"
  recommended_cell_is_valid: "${{ cells().exists(c, c.name == json_parse(sequence.assess_cell.outputs.assistantSummary).recommended_cell) }}"
  recommended_cell_final: "${{ json_parse(sequence.assess_cell.outputs.assistantSummary).cell_is_appropriate ? context.workflow.cell : (cells().exists(c, c.name == json_parse(sequence.assess_cell.outputs.assistantSummary).recommended_cell) ? json_parse(sequence.assess_cell.outputs.assistantSummary).recommended_cell : context.workflow.cell) }}"
