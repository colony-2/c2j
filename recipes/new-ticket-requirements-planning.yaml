id: new-ticket-requirements-planning
version: 0.1.0
desc: Generate requirement documents (+ contrarian API review) with iterative refinement inputs
input_schema:
  title:
    type: string
    required: true
  description:
    type: string
    required: true
  prior_plan_json:
    type: string
    required: false
  user_feedback:
    type: string
    required: false
  api_review_feedback:
    type: string
    required: false
inputs:
  title: "{{ inputs.title }}"
  description: "{{ inputs.description }}"
  prior_plan_json: '${{ has(inputs.prior_plan_json) ? inputs.prior_plan_json : "" }}'
  user_feedback: '${{ has(inputs.user_feedback) ? inputs.user_feedback : "" }}'
  api_review_feedback: '${{ has(inputs.api_review_feedback) ? inputs.api_review_feedback : "" }}'
sequence:
  - id: persist_plan_and_docs
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-requirements-author"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-requirements-author` skill contract.
        Create a requirements bundle for this job and write artifacts directly.

        Job Title: {{ inputs.title }}
        Job Description:
        {{ inputs.description }}

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}

        Prior artifacts may be present in inbox from the previous iteration:
        - `/src/inbox/requirements/plan.json`
        - `/src/inbox/requirements/api-review.json`
        If present, read them and incorporate the prior plan/review findings.

        Prior plan JSON fallback (only when inbox artifact is missing):
        {{ inputs.prior_plan_json }}

        User feedback to incorporate (if any):
        {{ inputs.user_feedback }}

        Requirements:
        - Produce one or more requirements.
        - Use stable IDs like REQ-1, REQ-2, ...
        - Include all requirement IDs in dependency_order in valid topological order.
        - Each requirement.target_cell MUST be one of the provided cell names.
        - requirements[].depends_on MUST reference only IDs in requirements[].
        - API changes MUST be backwards compatible. Do not include breaking changes.
        - Move answered details out of open_questions into scope/acceptance criteria.

        Write files under this absolute outbox directory:
        `/src/outbox/requirements`

        Required files:
        1) `plan.json` as valid JSON with EXACT keys:
           - summary (string)
           - needs_cross_cell_support (boolean)
           - dependency_order (array of string)
           - requirements (array of objects)
           - notes_for_user_review (string)

        Each requirements[] object must include:
           - id, title, target_cell, depends_on, scope, api_changes, acceptance_criteria, risks, open_questions
        Each api_changes[] entry must include:
           - service, change_type, description, backwards_compatible, migration_plan

        2) `index.md` summary document.
        3) One markdown file per requirement: `<REQ-ID>.md`.

        Do not modify repo code for this step.
        Final response must be ONLY the exact `plan.json` object content (no markdown, no prose).

  - id: contrarian_api_review
    op: ./server/llm/pkg/codex/extension-codex-exec
    artifacts:
      plan.json: '${{ sequence.persist_plan_and_docs.artifacts["requirements/plan.json"] }}'
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-requirements-contrarian-review"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-requirements-contrarian-review` skill contract.
        You are a contrarian reviewer focused on API design and backwards compatibility.
        Be skeptical. Reject any backwards-incompatible change.
        Also verify API changes align with target cell ownership/scope.

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}
        Requirements plan artifact path: `/src/inbox/plan.json`
        Read `plan.json` and evaluate it.

        Produce a review object:
        {
          "ok": boolean,
          "feedback": string,
          "blocking_issues": [string]
        }

        Write artifacts:
        - `/src/outbox/requirements/api-review.json`
        - `/src/outbox/requirements/api-review.md`

        `api-review.md` format:
        - `# API review (contrarian)`
        - `ok: \`<bool>\``
        - `## Feedback`
        - `## Blocking issues` (bulleted list or `(none)`)

        Final response must be ONLY the exact review JSON object.

outputs:
  plan_json: "{{ sequence.persist_plan_and_docs.outputs.assistantSummary }}"
  summary: "${{ json_parse(sequence.persist_plan_and_docs.outputs.assistantSummary).summary }}"
  needs_cross_cell_support: "${{ json_parse(sequence.persist_plan_and_docs.outputs.assistantSummary).needs_cross_cell_support }}"
  dependency_order: "${{ json_parse(sequence.persist_plan_and_docs.outputs.assistantSummary).dependency_order }}"
  requirements: "${{ json_parse(sequence.persist_plan_and_docs.outputs.assistantSummary).requirements }}"
  notes_for_user_review: "${{ json_parse(sequence.persist_plan_and_docs.outputs.assistantSummary).notes_for_user_review }}"
  api_review_ok: "${{ json_parse(sequence.contrarian_api_review.outputs.assistantSummary).ok }}"
  api_review_feedback: "${{ json_parse(sequence.contrarian_api_review.outputs.assistantSummary).feedback }}"
  api_review_blocking_issues: "${{ json_parse(sequence.contrarian_api_review.outputs.assistantSummary).blocking_issues }}"
