id: new-ticket-outcome-determination
version: 0.2.0
desc: Determine and maintain cell test statements and validation plan before implementation
input_schema:
  title:
    type: string
    required: true
  description:
    type: string
    required: true
  user_feedback:
    type: string
    required: false
inputs:
  title: "{{ inputs.title }}"
  description: "{{ inputs.description }}"
  user_feedback: '${{ has(inputs.user_feedback) ? inputs.user_feedback : "" }}'
sequence:
  - id: build_outcome_bundle
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-test-statement-curator"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-test-statement-curator` skill contract.
        Build an outcome-determination bundle for this ticket before implementation starts.

        Ticket Title: {{ inputs.title }}
        Ticket Description:
        {{ inputs.description }}

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}

        Input artifacts:
        - `/src/inbox/requirements/plan.json`
        - `/src/inbox/requirements/index.md`
        - `/src/inbox/implementation/plan.json`
        - `/src/inbox/implementation/index.md`

        Prior outcome artifacts may be present:
        - `/src/inbox/outcome/plan.json`
        - `/src/inbox/outcome/review.json`
        - `/src/inbox/outcome/tests-index.md`
        - `/src/inbox/outcome/validation-commands.txt`

        Authoritative test statement location in the cell repo:
        - `.c2/tests/*.md` (relative to the current cell root)

        User feedback to incorporate (if any):
        {{ inputs.user_feedback }}

        Requirements:
        - Identify current test statements relevant to this ticket and this cell.
        - Decide whether test statements need to be altered before implementation.
        - Keep expectations backwards compatible.
        - Test statements MUST be markdown.
        - Each test statement line must be 30 words or fewer.
        - Each statement must include filename(s), importance, unit/integration + dependencies, and polarity.
        - Include positive and negative cases for critical behavior and integration points.
        - Avoid trivial getter/setter checks.

        Write files under this absolute outbox directory:
        `/src/outbox/outcome`

        Required files:
        1) `plan.json` as valid JSON with EXACT keys:
           - summary (string)
           - current_test_statements_summary (string)
           - test_statement_updates_required (boolean)
           - test_statement_repo_glob (string)
           - validation_commands (string)
           - notes_for_user_review (string)
        2) `tests-index.md` (lists statement files under `.c2/tests/`)
        3) `validation-commands.txt` (newline-separated commands)
        4) `index.md`

        Also update or create test statement markdown files under `.c2/tests/*.md`.
        Do not modify source code for this step; only `.c2/tests/*.md` is allowed in repo changes.

        Final response must be ONLY the exact `plan.json` object content (no markdown, no prose).

  - id: contrarian_outcome_review
    op: ./server/llm/pkg/codex/extension-codex-exec
    artifacts:
      plan.json: '${{ sequence.build_outcome_bundle.artifacts["outcome/plan.json"] }}'
      tests-index.md: '${{ sequence.build_outcome_bundle.artifacts["outcome/tests-index.md"] }}'
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-outcome-contrarian-review"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-outcome-contrarian-review` skill contract.
        You are a contrarian reviewer for outcome determination and test statement quality.
        Be skeptical and block weak or incompatible outcomes.

        Review artifacts:
        - `/src/inbox/plan.json`
        - `/src/inbox/tests-index.md`
        - Cell repo statements under `.c2/tests/*.md`

        Validate:
        - Statements are markdown.
        - Each statement is 30 words or fewer.
        - Each statement includes filename(s), importance, test type + dependencies, and polarity.
        - Critical behavior includes both positive and negative statements.
        - Statements match requirements/implementation plan scope and avoid backwards-incompatible expectations.
        - Validation commands are sufficient for the stated outcomes.

        Produce a review object:
        {
          "ok": boolean,
          "feedback": string,
          "blocking_issues": [string]
        }

        Write artifacts:
        - `/src/outbox/outcome/review.json`
        - `/src/outbox/outcome/review.md`

        `review.md` format:
        - `# Outcome review (contrarian)`
        - `ok: \`<bool>\``
        - `## Feedback`
        - `## Blocking issues` (bulleted list or `(none)`)

        Final response must be ONLY the exact review JSON object.

outputs:
  plan_json: "{{ sequence.build_outcome_bundle.outputs.assistantSummary }}"
  summary: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).summary }}"
  current_test_statements_summary: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).current_test_statements_summary }}"
  test_statement_updates_required: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).test_statement_updates_required }}"
  test_statement_repo_glob: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).test_statement_repo_glob }}"
  validation_commands: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).validation_commands }}"
  notes_for_user_review: "${{ json_parse(sequence.build_outcome_bundle.outputs.assistantSummary).notes_for_user_review }}"
  review_ok: "${{ json_parse(sequence.contrarian_outcome_review.outputs.assistantSummary).ok }}"
  review_feedback: "${{ json_parse(sequence.contrarian_outcome_review.outputs.assistantSummary).feedback }}"
  review_blocking_issues: "${{ json_parse(sequence.contrarian_outcome_review.outputs.assistantSummary).blocking_issues }}"
