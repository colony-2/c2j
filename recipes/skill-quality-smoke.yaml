id: skill-quality-smoke
version: 0.2.0
sequence:
  - id: triage_local
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-triage-cell-boundary"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-triage-cell-boundary` skill contract.

        Ticket Title: Improve recipe test execution guidance
        Ticket Description:
        Add non-breaking recipe test coverage and supporting guidance for the recipe-testing cell.

        Current Cell: recipe-tests
        Available Cells (name, path, description):
        [
          {"name":"recipe-tests","path":".","description":"Recipe authoring, testing, and workflow guidance."},
          {"name":"frontend","path":"frontend","description":"UI implementation and styling."},
          {"name":"infra","path":"infra","description":"Infrastructure provisioning and deployment automation."}
        ]

        Decide if the current cell is appropriate to run the work.
        - Treat the current cell as appropriate ONLY if it is the best match among the Available Cells.
        - Prefer specialized cells over general-purpose cells when a specialized cell clearly matches.
        - If the current cell is not the best match, set cell_is_appropriate=false and choose the
          single best cell name from the Available Cells list (use the cell "name" value).
        - Use the cell descriptions to guide your choice and provide a concise rationale.

        Write JSON artifact files:
        - `/src/outbox/triage/latest-status.json`
        - `/src/outbox/triage/decision.md`

        JSON schema:
        {
          "cell_is_appropriate": boolean,
          "recommended_cell": string,
          "rationale": string
        }

        Final response must be ONLY the exact JSON object above.

  - id: triage_frontend
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-triage-cell-boundary"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-triage-cell-boundary` skill contract.

        Ticket Title: Redesign filter drawer interaction
        Ticket Description:
        Update the React filter drawer in the browser UI, change button spacing, and add a loading skeleton while results fetch.

        Current Cell: recipe-tests
        Available Cells (name, path, description):
        [
          {"name":"recipe-tests","path":".","description":"Recipe authoring, testing, and workflow guidance."},
          {"name":"frontend","path":"frontend","description":"UI implementation and styling."},
          {"name":"infra","path":"infra","description":"Infrastructure provisioning and deployment automation."}
        ]

        Decide if the current cell is appropriate to run the work.
        - Treat the current cell as appropriate ONLY if it is the best match among the Available Cells.
        - Prefer specialized cells over general-purpose cells when a specialized cell clearly matches.
        - If the current cell is not the best match, set cell_is_appropriate=false and choose the
          single best cell name from the Available Cells list (use the cell "name" value).
        - Use the cell descriptions to guide your choice and provide a concise rationale.

        Write JSON artifact files:
        - `/src/outbox/triage/latest-status.json`
        - `/src/outbox/triage/decision.md`

        JSON schema:
        {
          "cell_is_appropriate": boolean,
          "recommended_cell": string,
          "rationale": string
        }

        Final response must be ONLY the exact JSON object above.

  - id: requirements_good
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-requirements-author"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-requirements-author` skill contract.
        Create a requirements bundle for this ticket and write artifacts directly.

        Ticket Title: Improve recipe test execution guidance
        Ticket Description:
        Add non-breaking recipe test coverage and supporting guidance for the recipe-testing cell.

        Current Cell: recipe-tests
        Available Cells (name, path, description):
        [
          {"name":"recipe-tests","path":".","description":"Recipe authoring, testing, and workflow guidance."},
          {"name":"frontend","path":"frontend","description":"UI implementation and styling."},
          {"name":"infra","path":"infra","description":"Infrastructure provisioning and deployment automation."}
        ]

        Prior plan JSON fallback (only when inbox artifact is missing):

        User feedback to incorporate (if any):
        Keep the change local to recipe authoring and testing.

        Requirements:
        - Produce one or more requirements.
        - Use stable IDs like REQ-1, REQ-2, ...
        - Include all requirement IDs in dependency_order in valid topological order.
        - Each requirement.target_cell MUST be one of the provided cell names.
        - requirements[].depends_on MUST reference only IDs in requirements[].
        - API changes MUST be backwards compatible. Do not include breaking changes.
        - Move answered details out of open_questions into scope/acceptance criteria.

        Write files under this absolute outbox directory:
        `/src/outbox/requirements`

        Required files:
        1) `plan.json` as valid JSON with EXACT keys:
           - summary (string)
           - needs_cross_cell_support (boolean)
           - dependency_order (array of string)
           - requirements (array of objects)
           - notes_for_user_review (string)

        Each requirements[] object must include:
           - id, title, target_cell, depends_on, scope, api_changes, acceptance_criteria, risks, open_questions
        Each api_changes[] entry must include:
           - service, change_type, description, backwards_compatible, migration_plan

        2) `index.md` summary document.
        3) One markdown file per requirement: `<REQ-ID>.md`.

        Do not modify repo code for this step.
        Final response must be ONLY the exact `plan.json` object content (no markdown, no prose).

  - id: requirements_review_good
    op: ./server/llm/pkg/codex/extension-codex-exec
    artifacts:
      plan.json: '${{ sequence.requirements_good.artifacts["requirements/plan.json"] }}'
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-requirements-contrarian-review"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-requirements-contrarian-review` skill contract.
        You are a contrarian reviewer focused on API design and backwards compatibility.
        Be skeptical. Reject any backwards-incompatible change.
        Also verify API changes align with target cell ownership/scope.

        Current Cell: recipe-tests
        Available Cells (name, path, description):
        [
          {"name":"recipe-tests","path":".","description":"Recipe authoring, testing, and workflow guidance."},
          {"name":"frontend","path":"frontend","description":"UI implementation and styling."},
          {"name":"infra","path":"infra","description":"Infrastructure provisioning and deployment automation."}
        ]
        Requirements plan artifact path: `/src/inbox/plan.json`
        Read `plan.json` and evaluate it.

        Produce a review object:
        {
          "ok": boolean,
          "feedback": string,
          "blocking_issues": [string]
        }

        Write artifacts:
        - `/src/outbox/requirements/api-review.json`
        - `/src/outbox/requirements/api-review.md`

        Final response must be ONLY the exact review JSON object.

  - id: requirements_bad_seed
    op: command_execution
    inputs:
      timeout: 5m
      run: |
        set -euo pipefail
        OUT="{{ context.environment.outbox }}"
        mkdir -p "$OUT/bad-requirements"
        cat > "$OUT/bad-requirements/plan.json" <<'JSON'
        {
          "summary": "Break the recipe test CLI to simplify invocation.",
          "needs_cross_cell_support": false,
          "dependency_order": ["REQ-1"],
          "requirements": [
            {
              "id": "REQ-1",
              "title": "Remove the old case selection flag",
              "target_cell": "recipe-tests",
              "depends_on": [],
              "scope": "Delete the existing CLI flag and require a new incompatible replacement immediately.",
              "api_changes": [
                {
                  "service": "recipe-test-cli",
                  "change_type": "remove_flag",
                  "description": "Remove --case and require --case-id only.",
                  "backwards_compatible": false,
                  "migration_plan": "none"
                }
              ],
              "acceptance_criteria": [
                "Only the new flag is accepted."
              ],
              "risks": [
                "Existing callers will fail."
              ],
              "open_questions": []
            }
          ],
          "notes_for_user_review": ""
        }
        JSON

  - id: requirements_review_bad
    op: ./server/llm/pkg/codex/extension-codex-exec
    artifacts:
      plan.json: '${{ sequence.requirements_bad_seed.artifacts["bad-requirements/plan.json"] }}'
    inputs:
