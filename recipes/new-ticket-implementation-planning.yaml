id: new-ticket-implementation-planning
version: 0.1.0
desc: Generate an implementation plan bundle with dependency gating and compatibility review
input_schema:
  title:
    type: string
    required: true
  description:
    type: string
    required: true
  user_feedback:
    type: string
    required: false
inputs:
  title: "{{ inputs.title }}"
  description: "{{ inputs.description }}"
  user_feedback: '${{ has(inputs.user_feedback) ? inputs.user_feedback : "" }}'
sequence:
  - id: build_plan
    op: ./server/llm/pkg/codex/extension-codex-exec
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-implementation-plan-author"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-implementation-plan-author` skill contract.
        Build an implementation plan for this job and write artifacts directly.

        Job Title: {{ inputs.title }}
        Job Description:
        {{ inputs.description }}

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}

        Input artifacts:
        - `/src/inbox/requirements/plan.json`
        - `/src/inbox/requirements/index.md`

        Prior implementation-planning artifacts may be present:
        - `/src/inbox/implementation/plan.json`
        - `/src/inbox/implementation/compat-review.json`

        User feedback to incorporate (if any):
        {{ inputs.user_feedback }}

        Rules:
        - Never plan a backwards-incompatible change.
        - If dependent cells must complete work before this cell can safely implement, set `requires_dependency_jobs=true`.
        - `dependency_order` must be valid topological order for all requirement IDs referenced.
        - `dependency_job_specs` must include ONLY requirements targeting other cells.
        - `dependency_job_specs[].depends_on_ids` must reference requirement IDs.

        Write files under this absolute outbox directory:
        `/src/outbox/implementation`

        Required files:
        1) `plan.json` as valid JSON with EXACT keys:
           - summary (string)
           - requires_dependency_jobs (boolean)
           - dependency_order (array of string)
           - dependency_job_specs (array of objects)
           - local_steps (array of string)
           - notes_for_user_review (string)

        Each dependency_job_specs[] object must include:
           - id (string)
           - title (string)
           - target_cell (string)
           - depends_on_ids (array of string)
           - depends_on_markdown (string)
           - scope (string)
           - acceptance_criteria_markdown (string)
           - risks_markdown (string)
           - notes (string)

        2) `index.md` implementation summary document.
        3) One markdown file per dependency job spec: `<REQ-ID>.md`.

        Do not modify repo code for this step.
        Final response must be ONLY the exact `plan.json` object content (no markdown, no prose).

  - id: compat_review
    op: ./server/llm/pkg/codex/extension-codex-exec
    artifacts:
      plan.json: '${{ sequence.build_plan.artifacts["implementation/plan.json"] }}'
    inputs:
      worktree_path: "{{ context.environment.worktree_path }}"
      cell_relative_path: >-
        ${{
          (has(context.workflow.cell_path) && context.workflow.cell_path != "")
            ? context.workflow.cell_path
            : "."
        }}
      skill: "c2-implementation-compat-review"
      skill_mode: "enforce"
      skills:
        - "gitl.colony2.com/jnadeau/skills/.agents/skills@1362438426e25c733174ea85f248db11af99a8a7"
      prompt: |
        Follow the `c2-implementation-compat-review` skill contract.
        You are a contrarian implementation-plan reviewer focused on compatibility and dependency sequencing.
        Reject any backwards-incompatible proposal.

        Current Cell: {{ context.workflow.cell }}
        Available Cells (name, path, description): {{ cells | to_json }}
        Plan artifact path: `/src/inbox/plan.json`
        Read `plan.json` and evaluate it.

        Produce a review object:
        {
          "ok": boolean,
          "feedback": string,
          "blocking_issues": [string]
        }

        Write artifacts:
        - `/src/outbox/implementation/compat-review.json`
        - `/src/outbox/implementation/compat-review.md`

        `compat-review.md` format:
        - `# Implementation plan compatibility review`
        - `ok: \`<bool>\``
        - `## Feedback`
        - `## Blocking issues` (bulleted list or `(none)`)

        Final response must be ONLY the exact review JSON object.

outputs:
  plan_json: "{{ sequence.build_plan.outputs.assistantSummary }}"
  summary: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).summary }}"
  requires_dependency_jobs: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).requires_dependency_jobs }}"
  dependency_order: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).dependency_order }}"
  dependency_job_specs: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).dependency_job_specs }}"
  local_steps: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).local_steps }}"
  notes_for_user_review: "${{ json_parse(sequence.build_plan.outputs.assistantSummary).notes_for_user_review }}"
  compat_review_ok: "${{ json_parse(sequence.compat_review.outputs.assistantSummary).ok }}"
  compat_review_feedback: "${{ json_parse(sequence.compat_review.outputs.assistantSummary).feedback }}"
  compat_review_blocking_issues: "${{ json_parse(sequence.compat_review.outputs.assistantSummary).blocking_issues }}"
