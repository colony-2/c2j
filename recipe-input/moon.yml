id: 'server/recipe-input'
language: 'go'
type: 'library'

tasks:
  build-openapi:
    script: |
      set -e
      rm -f pkg/openapi/generated.go
      go run github.com/deepmap/oapi-codegen/v2/cmd/oapi-codegen@v2.1.0 -config codegen.yml -o pkg/openapi/generated.go api/openapi/recipe-input-api.yaml
    inputs:
      - 'codegen.yml'
      - 'api/openapi/recipe-input-api.yaml'
    outputs:
      - 'pkg/openapi/generated.go'
    options:
      runInCI: true
      outputStyle: buffer-only-failure
