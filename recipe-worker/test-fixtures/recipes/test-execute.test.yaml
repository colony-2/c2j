- name: custom_message_echo
  description: Test execute with custom message
  inputs:
    message: Custom message
  want:
    echo_message:
      stdout: "Custom message"
      success: true
      exit_code: 0
      stderr: ''
      error_message: ''
      timed_out: false
  wantErr: false
- name: empty_message_echo
  description: Test execute with empty message
  inputs:
    message: ''
  want:
    echo_message:
      stdout: ""
      success: true
      exit_code: 0
      stderr: ''
      error_message: ''
      timed_out: false
  wantErr: false
