id: artifact-inbox-command
desc: Write artifact via outbox then consume via inbox binding
version: "1.0.0"
input_schema: {}
sequence:
  - id: write_outbox
    op: command_execution
    inputs:
      working_directory: "{{ context.environment.outbox }}"
      run: "printf 'hello inbox' > payload.txt"
  - id: read_inbox
    op: command_execution
    inputs:
      working_directory: "{{ context.environment.inbox }}"
      run: "cat payload.txt"
    artifacts:
      payload.txt: '${{ sequence.write_outbox.artifacts["payload.txt"] }}'
outputs:
  read_content: '{{ sequence.read_inbox.outputs.stdout }}'
