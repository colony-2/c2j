id: json-parse-subtree
desc: Test json_parse for structured op inputs
version: '1.0'
input_schema:
  config_json:
    type: string
    required: true
  label:
    type: string
    required: true
  flag:
    type: string
    default_value: default-flag
inputs:
  config_json: '{{ inputs.config_json }}'
  label: '{{ inputs.label }}'
  flag: '${{ has(inputs.flag) ? inputs.flag : "default-flag" }}'
sequence:
- id: show
  op: test_complex_input
  inputs:
    config: '${{ json_parse(inputs.config_json) }}'
    meta:
      label: '{{ inputs.label }}'
      flags:
      - '{{ inputs.flag }}'
      - static-flag
outputs:
  config: '${{ sequence.show.outputs.config  }}'
  meta: '${{ sequence.show.outputs.meta  }}'
